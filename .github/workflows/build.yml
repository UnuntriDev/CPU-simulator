name: Build

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore and build
        run: msbuild Symulator_x86_Arkadiusz_Tokarczyk.sln /restore /p:Configuration=Debug /p:Platform="Any CPU"

      - name: Run CPU tests
        run: dotnet test .\Symulator_x86.Tests\Symulator_x86.Tests.csproj --configuration Debug --no-build

      - name: Build release package
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          msbuild Symulator_x86_Arkadiusz_Tokarczyk.sln /restore /p:Configuration=Release /p:Platform="Any CPU"
          $source = "Symulator_x86_Arkadiusz_Tokarczyk\bin\Release\net472"
          $staging = Join-Path $env:RUNNER_TEMP "CPU-simulator"
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          Copy-Item "$source\Symulator_x86_Arkadiusz_Tokarczyk.exe" $staging
          Copy-Item "$source\Symulator_x86_Arkadiusz_Tokarczyk.exe.config" $staging -ErrorAction SilentlyContinue
          Compress-Archive -Path "$staging\*" -DestinationPath "CPU-simulator-${{ github.ref_name }}.zip" -Force

      - name: Upload release artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: CPU-simulator-${{ github.ref_name }}
          path: CPU-simulator-${{ github.ref_name }}.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" "CPU-simulator-${{ github.ref_name }}.zip" --title "CPU Simulator ${{ github.ref_name }}" --notes "Windows build of CPU Simulator."
